<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>六十甲子日柱性格 - 八字探秘</title>
<style>
  :root {
    --bg: #f4f7f2;
    --card-bg: #ffffff;
    --gold: #5a8f6c;
    --gold-light: #3d6b4f;
    --red: #4a9c6c;
    --red-light: #6dbd8a;
    --text: #2d3a30;
    --text-dim: #7d8f82;
    --wood: #40916c;
    --fire: #e07b5a;
    --earth: #c9a040;
    --metal: #8b9d83;
    --water: #5a8fad;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ===== 页面容器 ===== */
  .page {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.4s ease, opacity 0.4s ease;
  }
  .page-input { display: flex; }
  .page-result { display: none; }
  body.show-result .page-input { display: none; }
  body.show-result .page-result { display: flex; animation: fadeUp 0.45s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== 顶部装饰 ===== */
  .header {
    text-align: center;
    padding: 28px 20px 6px;
    position: relative;
  }
  .header .icon { font-size: 28px; letter-spacing: 2px; margin-bottom: 6px; filter: drop-shadow(0 2px 4px rgba(90,143,108,0.2)); }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--gold-light); letter-spacing: 3px; }
  .header .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; letter-spacing: 2px; }
  .mbti-tag {
    display: inline-block; margin-top: 10px; padding: 4px 14px;
    font-size: 12px; font-weight: 600; letter-spacing: 1px;
    color: #40916c; background: rgba(64,145,108,0.08);
    border: 1px solid rgba(64,145,108,0.2); border-radius: 20px;
  }

  .divider {
    width: 60%; max-width: 260px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(90,143,108,0.5), transparent);
    margin: 14px auto;
  }

  /* ===== 输入卡片 ===== */
  .card {
    background: var(--card-bg);
    border: 1px solid rgba(90,143,108,0.15);
    border-radius: 14px;
    padding: 22px 20px;
    width: calc(100% - 32px);
    max-width: 400px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    margin: 10px 0;
  }
  .card label { display: block; font-size: 14px; color: var(--gold-light); margin-bottom: 8px; letter-spacing: 1px; }
  .card input[type="date"] {
    width: 100%; padding: 12px 14px; font-size: 16px;
    border: 1px solid rgba(90,143,108,0.25); border-radius: 10px;
    background: #f9faf7; color: var(--text); font-family: inherit; outline: none;
    transition: border-color 0.3s; -webkit-appearance: none;
  }
  .card input[type="date"]:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(90,143,108,0.08); }
  .card input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.4) sepia(0.5) saturate(3) hue-rotate(70deg);
  }

  .btn {
    display: block; width: calc(100% - 32px); max-width: 400px; margin: 16px auto;
    padding: 14px 0; font-size: 17px; font-weight: 700; letter-spacing: 2px;
    color: #fff; background: linear-gradient(135deg, #2d6a4f, #40916c);
    border: none; border-radius: 25px; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(45,106,79,0.25); transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(45,106,79,0.2); }

  /* ===== 日柱展示 ===== */
  .pillar-section { text-align: center; margin: 6px 0 12px; }
  .pillar-name {
    font-size: 48px; font-weight: 900; color: var(--gold-light);
    letter-spacing: 6px; text-shadow: 0 0 40px rgba(201,169,110,0.4);
    line-height: 1.1;
  }
  .pillar-subtitle { font-size: 14px; color: var(--text-dim); margin-top: 2px; letter-spacing: 2px; }

  /* 序号徽章 */
  .rank-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 20px; margin: 10px 0 6px;
    background: rgba(90,143,108,0.06); border: 1px solid rgba(90,143,108,0.2);
    font-size: 12px; color: var(--gold-light); letter-spacing: 1px;
  }
  .rank-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
    box-shadow: 0 0 6px rgba(90,143,108,0.3);
  }

  /* 形象标签 */
  .vibe-box {
    text-align: center; margin: 4px 0 8px;
    width: calc(100% - 32px); max-width: 400px;
  }
  .vibe-tag {
    display: inline-block; padding: 6px 16px; border-radius: 20px;
    font-size: 15px; font-weight: 700; letter-spacing: 1px;
    background: rgba(90,143,108,0.08);
    border: 1px solid rgba(90,143,108,0.2);
    color: var(--gold-light);
  }
  .vibe-quote {
    display: block; margin-top: 8px;
    font-size: 14px; color: var(--text-dim);
    font-style: italic; letter-spacing: 1px;
  }

  /* 五行标签 */
  .element-tag {
    display: inline-block; padding: 6px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600; letter-spacing: 2px; color: #fff; margin: 0 auto 14px;
  }
  .element-tag.wood  { background: var(--wood); }
  .element-tag.fire  { background: var(--fire); }
  .element-tag.earth { background: var(--earth); color: #3a2a00; }
  .element-tag.metal { background: var(--metal); }
  .element-tag.water { background: var(--water); }

  /* 性格分析 */
  .personality-card {
    background: var(--card-bg);
    border: 1px solid rgba(90,143,108,0.1);
    border-radius: 14px; padding: 20px 18px; margin-bottom: 14px; position: relative;
    width: calc(100% - 32px); max-width: 400px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .personality-card::before {
    content: "❝"; position: absolute; top: -8px; left: 14px;
    font-size: 24px; color: var(--gold); opacity: 0.3;
  }
  .personality-card h3 { font-size: 15px; color: var(--gold); margin-bottom: 10px; letter-spacing: 1px; }
  .personality-card p { font-size: 14px; line-height: 1.9; color: var(--text); text-align: justify; }

  .traits-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

  /* 子卡片区域 */
  .sub-cards { width: calc(100% - 32px); max-width: 400px; margin: 0 auto; }
  .sub-card {
    background: var(--card-bg);
    border: 1px solid rgba(90,143,108,0.08);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.03);
  }
  .sub-card-head {
    font-size: 14px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px;
    color: var(--gold-light);
  }
  .sub-card-body { font-size: 13px; line-height: 1.7; color: var(--text); margin: 0; }
  .life-card { border-left: 3px solid #95d5b2; background: rgba(149,213,178,0.04); }
  .career-card { border-left: 3px solid #40916c; }
  .marriage-card { border-left: 3px solid #e07b5a; }
  .pros-card { border-left: 3px solid #52b788; }
  .cons-card { border-left: 3px solid #d4a373; }
  .sub-card-row { display: flex; gap: 10px; }
  .sub-card-row .sub-card { flex: 1; }

  .trait-chip {
    padding: 5px 12px; border-radius: 14px; font-size: 12px;
    background: rgba(90,143,108,0.08); border: 1px solid rgba(90,143,108,0.2); color: var(--gold-light);
  }

  .btn-reset {
    display: block; width: calc(100% - 32px); max-width: 400px; margin: 6px auto 30px;
    padding: 12px 0; font-size: 14px; letter-spacing: 1px; color: var(--gold);
    background: transparent; border: 1px solid rgba(90,143,108,0.3); border-radius: 25px;
    cursor: pointer; font-family: inherit; transition: background 0.2s;
  }
  .btn-reset:active { background: rgba(90,143,108,0.06); }

  /* 查看完整八字 */
  .btn-bazi {
    display: block; width: calc(100% - 32px); max-width: 400px; margin: 14px auto 6px;
    padding: 12px 0; font-size: 14px; font-weight: 600; letter-spacing: 2px;
    color: var(--gold-light); background: transparent;
    border: 1px dashed rgba(90,143,108,0.3); border-radius: 25px;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-bazi:active { background: rgba(90,143,108,0.04); }

  /* 八字面板 */
  .bazi-panel { display: none; width: calc(100% - 32px); max-width: 400px; margin: 0 auto; }
  .bazi-panel.show { display: block; animation: fadeUp 0.35s ease; }
  .hour-select {
    width: 100%; padding: 12px 14px; font-size: 15px; border-radius: 10px;
    border: 1px solid rgba(90,143,108,0.2); background: #f9faf7;
    color: var(--text); font-family: inherit; outline: none; margin-top: 6px;
  }
  .bazi-chart {
    background: var(--card-bg); border: 1px solid rgba(90,143,108,0.12);
    border-radius: 14px; padding: 16px 8px; margin-top: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .bz-header, .bz-row {
    display: flex; justify-content: space-around; text-align: center;
  }
  .bz-header span {
    flex: 1; font-size: 11px; color: var(--text-dim); letter-spacing: 1px; padding: 4px 0;
  }
  .bz-header .bz-self { color: #b8753e; font-weight: 700; }
  .bz-char {
    flex: 1; font-size: 40px; font-weight: 900; padding: 8px 0;
    font-family: "KaiTi","STKaiti","楷体","PingFang SC","Microsoft YaHei",serif;
  }
  .bz-self-char {
    background: rgba(184,117,62,0.08); border-radius: 8px;
  }

  /* 稀有度 */
  .rarity-badge {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: calc(100% - 32px); max-width: 400px; margin: 0 auto 12px;
    padding: 10px 0; font-size: 13px; color: var(--gold-light); letter-spacing: 1px;
    background: rgba(90,143,108,0.04); border-radius: 10px;
    border: 1px dashed rgba(90,143,108,0.2);
  }
  .rarity-icon { font-size: 16px; }

  /* 分享按钮 */
  .btn-share {
    display: block; width: calc(100% - 32px); max-width: 400px; margin: 14px auto 10px;
    padding: 13px 0; font-size: 15px; font-weight: 600; letter-spacing: 2px;
    color: #fff; background: linear-gradient(135deg, #52b788, #40916c);
    border: none; border-radius: 25px; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(64,145,108,0.3); transition: transform 0.2s;
  }
  .btn-share:active { transform: scale(0.97); }

  /* 海报弹窗 */
  .poster-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
  .poster-modal.show { display: flex; align-items: center; justify-content: center; }
  .poster-backdrop { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
  .poster-container { position: relative; z-index: 1; text-align: center; max-width: 90vw; max-height: 90vh; }
  .poster-container canvas { width: 100%; max-width: 375px; height: auto; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.25); }
  .poster-tip { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 12px; letter-spacing: 1px; }
  .poster-close {
    position: absolute; top: -40px; right: 0; width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.2); color: #fff; border: none; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .footer {
    text-align: center; font-size: 11px; color: rgba(45,58,48,0.3);
    padding: 20px 0 24px; letter-spacing: 1px; margin-top: auto;
  }
</style>
</head>
<body>

<div class="page page-input">
  <div class="header">
    <div class="icon">
      <svg width="72" height="72" viewBox="0 0 72 72">

<div class="page page-result">
  <div class="header">
    <div class="icon">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle cx="36" cy="36" r="33" fill="none" stroke="rgba(90,143,108,0.2)" stroke-width="1.5"/>
        <circle cx="36" cy="14" r="5" fill="#4a9c5c" opacity="0.9"/>
        <circle cx="57" cy="31" r="5" fill="#e0554a" opacity="0.9"/>
        <circle cx="49" cy="55" r="5" fill="#c9a040" opacity="0.9"/>
        <circle cx="23" cy="55" r="5" fill="#c9a870" opacity="0.9"/>
        <circle cx="15" cy="31" r="5" fill="#4a80b4" opacity="0.9"/>
        <line x1="36" y1="14" x2="57" y2="31" stroke="rgba(90,143,108,0.15)" stroke-width="0.8"/>
        <line x1="57" y1="31" x2="49" y2="55" stroke="rgba(90,143,108,0.15)" stroke-width="0.8"/>
        <line x1="49" y1="55" x2="23" y2="55" stroke="rgba(90,143,108,0.15)" stroke-width="0.8"/>
        <line x1="23" y1="55" x2="15" y2="31" stroke="rgba(90,143,108,0.15)" stroke-width="0.8"/>
        <line x1="15" y1="31" x2="36" y2="14" stroke="rgba(90,143,108,0.15)" stroke-width="0.8"/>
      </svg>

    <h1>六十甲子日柱</h1>
  </div>
  <div class="divider"></div>

  <div class="pillar-section">
    <div class="pillar-name" id="pillarName">甲子</div>
    <div class="pillar-subtitle" id="pillarLabel">日柱</div>

      <span class="rank-dot"></span><span id="rankText">六十甲子 第 1/60 柱</span><span class="rank-dot"></span>

  <div class="vibe-box">

  <div class="sub-cards">

      </div>

        <div class="sub-card-head">⚠️ 核心缺点</div>
        <p class="sub-card-body" id="consText"></p>

<script>
// ==================== 基础数据 ====================

const STEMS    = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const BRANCHES = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const ELEMENTS = ["木","木","火","火","土","土","金","金","水","水"];
const YIN_YANG = ["阳","阴","阳","阴","阳","阴","阳","阴","阳","阴"];
const ELEM_CSS = ["wood","wood","fire","fire","earth","earth","metal","metal","water","water"];

// ==================== 六十甲子性格库 ====================
// 0=甲子, 1=乙丑, ..., 59=癸亥
const PILLARS = [

// ==================== 核心算法 ====================

/** 计算六十甲子序号（0~59） */
function getPillarIndex(stemIndex, branchIndex) {
  return ((stemIndex * 6) - (branchIndex * 5) + 60) % 60;
}

/**
 * 计算日柱（标准公式）
 * 基准：1900-01-01 = 甲戌日（六十甲子第11位，0-indexed 第10位）
 * 公式：基数 = (年尾+3)*5 + 55 + (年尾-1)/4 + 当年第几天
 * 日干序号 = 基数%10（1甲2乙...0癸）
 * 日支序号 = 基数%12（1子2丑...0亥）
 * 等效于：diffDays + 10 偏移后取模
 */
function calcDayPillar(year, month, day) {
  var baseDate = new Date(1900, 0, 1);
  var targetDate = new Date(year, month - 1, day);
  var diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
  // 基准日 1900-01-01 = 甲戌（天干偏移+10，地支偏移+10）
  var stemIndex  = ((diffDays + 10) % 10 + 10) % 10;
  var branchIndex = ((diffDays + 10) % 12 + 12) % 12;
  var pillarIndex = getPillarIndex(stemIndex, branchIndex);
  return {
    stem: STEMS[stemIndex],
    branch: BRANCHES[branchIndex],
    stemIndex: stemIndex,
    branchIndex: branchIndex,
    pillarIndex: pillarIndex,
    pillarData: PILLARS[pillarIndex]
  };
}

/** 将完整desc拆分为主文、事业、婚姻、优点、缺点 */
function splitDesc(text) {
  var result = { main: "", life: "", career: "", marriage: "", pros: "", cons: "" };
  if (!text) return result;

  var parts = text.split("【");
  // parts[0] 是主文
  result.main = parts[0].replace(/\s+$/, "");

  for (var i = 1; i < parts.length; i++) {
    var p = parts[i];
    if (p.indexOf("生活】") === 0 || p.indexOf("生活画像】") === 0) result.life = p.replace(/^生活[^】]*】/, "").trim();
    else if (p.indexOf("事业】") === 0 || p.indexOf("事业方向】") === 0) result.career = p.replace(/^事业[^】]*】/, "").trim();
    else if (p.indexOf("婚姻】") === 0 || p.indexOf("感情婚姻】") === 0) result.marriage = p.replace(/^婚姻[^】]*】/, "").replace(/^感情婚姻】/, "").trim();
    else if (p.indexOf("优点】") === 0 || p.indexOf("核心优点】") === 0) result.pros = p.replace(/^优点[^】]*】/, "").replace(/^核心优点】/, "").trim();
    else if (p.indexOf("缺点】") === 0 || p.indexOf("核心缺点】") === 0) result.cons = p.replace(/^缺点[^】]*】/, "").replace(/^核心缺点】/, "").trim();
  }
  return result;
}

/** 年柱计算：1900=庚子年（0-index: stem=6, branch=0），按立春近似以公历年简化 */
function calcYearPillar(year) {
  // 1900 = 庚子 (stem 6, branch 0)
  // 1901 = 辛丑 (stem 7, branch 1)... directly increment each year
  var d = year - 1900;
  var si = ((d + 6) % 10 + 10) % 10;
  var bi = ((d + 0) % 12 + 12) % 12;
  return { stem: STEMS[si], branch: BRANCHES[bi], stemIndex: si, branchIndex: bi };
}

/** 月柱计算：按五虎遁，月支 = (公历月 % 12)，寅月起点天干由年干决定 */
function calcMonthPillar(yearStemIndex, month) {
  // 月支：1月→丑(1), 2月→寅(2), ..., 12月→子(0)
  var bi = month % 12;

  // 五虎遁：寅月天干起点
  var startStemMap = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0]; // 甲0→丙2, 乙1→戊4, 丙2→庚6, ...
  // 甲0己5→丙2, 乙1庚6→戊4, 丙2辛7→庚6, 丁3壬8→壬8, 戊4癸9→甲0
  var start = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0];
  var baseStem = start[yearStemIndex]; // 寅月(monthFeb=2)的天干

  // monthStemIndex = (baseStem + bi - 2 + 10) % 10
  var si = ((baseStem + bi - 2) % 10 + 10) % 10;
  return { stem: STEMS[si], branch: BRANCHES[bi], stemIndex: si, branchIndex: bi };
}

/** 时柱计算：按五鼠遁，时支由小时决定 */
function calcHourPillar(dayStemIndex, hourBranchIndex) {
  // 五鼠遁：子时天干起点
  var start = [0, 2, 4, 6, 8, 0, 2, 4, 6, 8]; // 甲0→甲0, 乙1→丙2, 丁3→庚6, ...
  var baseStem = start[dayStemIndex];

  var si = (baseStem + hourBranchIndex) % 10;
  return { stem: STEMS[si], branch: BRANCHES[hourBranchIndex], stemIndex: si, branchIndex: hourBranchIndex };
}

  var hb = parseInt(birthHour.value);
  var year = currentYear, month = currentMonth, day = currentDay;
  if (!year) return;

  var dayPillar = calcDayPillar(year, month, day);
  var yearPillar = calcYearPillar(year);
  var monthPillar = calcMonthPillar(yearPillar.stemIndex, month);

  setBzChar("yearStem", yearPillar.stem);
  setBzChar("yearBranch", yearPillar.branch);
  setBzChar("monthStem", monthPillar.stem);
  setBzChar("monthBranch", monthPillar.branch);
  setBzChar("dayStem", dayPillar.stem);
  setBzChar("dayBranch", dayPillar.branch);

  if (hb >= 0) {
    var hourPillar = calcHourPillar(dayPillar.stemIndex, hb);
    setBzChar("hourStem", hourPillar.stem);
    setBzChar("hourBranch", hourPillar.branch);
  } else {
    document.getElementById("hourStem").textContent = "?";
    document.getElementById("hourBranch").textContent = "?";
    document.getElementById("hourStem").style.color = "#ccc";
    document.getElementById("hourBranch").style.color = "#ccc";
  }
}

// ==================== 分享海报 ====================

function drawFiveElementLogo(ctx, cx, cy, size) {
  var r = size;
  var dotR = size * 0.13;
  var colors = ["#4a9c5c","#e0554a","#c9a040","#c9a870","#4a80b4"];
  var angles = [-90, -18, 54, 126, 198];
  var dots = [];
  // 外圈
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(90,143,108,0.25)";
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // 计算点位
  for (var i = 0; i < 5; i++) {
    var rad = angles[i] * Math.PI / 180;
    dots.push({ x: cx + Math.cos(rad) * (r - dotR - 2), y: cy + Math.sin(rad) * (r - dotR - 2), c: colors[i] });
  }
  // 连线
  for (var i = 0; i < 5; i++) {
    var n = (i + 1) % 5;
    ctx.beginPath();
    ctx.moveTo(dots[i].x, dots[i].y);
    ctx.lineTo(dots[n].x, dots[n].y);
    ctx.strokeStyle = "rgba(90,143,108,0.12)";
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
  // 圆点
  for (var i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(dots[i].x, dots[i].y, dotR, 0, Math.PI * 2);
    ctx.fillStyle = dots[i].c;
    ctx.fill();
  }
}

function generatePoster() {
  if (!currentPillar) return;
  var canvas = posterCanvas;
  var ctx = canvas.getContext("2d");
  var w = canvas.width;
  var h = canvas.height;

  // === 背景 ===
  ctx.fillStyle = "#f8faf6";
  ctx.fillRect(0, 0, w, h);

  // === 顶部区域 ===
  drawFiveElementLogo(ctx, w/2, 90, 44);

  ctx.fillStyle = "#2d6a4f";
  ctx.font = "bold 32px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("六十甲子日柱", w/2, 170);

  ctx.fillStyle = "#8d9f92";
  ctx.font = "18px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText("属于东方自己的MBTI人格", w/2, 200);

  // === 日柱大字 ===
  var elemColors = ["#40916c","#40916c","#e0554a","#e0554a","#c9a040","#c9a040","#c9a870","#c9a870","#4a80b4","#4a80b4"];
  var color = elemColors[currentStemIndex] || "#2d6a4f";
  ctx.fillStyle = color;
  ctx.font = "bold 200px 'KaiTi','STKaiti','楷体','PingFang SC',sans-serif";
  ctx.fillText(currentPillar.name, w/2, 370);

  // === 形象标签 ===
  var y = 410;
  if (currentPillar.vibe) {
    ctx.font = "bold 28px 'PingFang SC','Microsoft YaHei',sans-serif";
    var vw = ctx.measureText(currentPillar.vibe).width + 48;
    ctx.fillStyle = "rgba(64,145,108,0.08)";
    ctx.strokeStyle = "rgba(64,145,108,0.25)";
    ctx.lineWidth = 1;
    roundRect(ctx, w/2 - vw/2, y-22, vw, 40, 20);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#2d6a4f";
    ctx.fillText(currentPillar.vibe, w/2, y+6);
    y += 56;
  }

  // === 一句话 ===
  if (currentPillar.quote) {
    ctx.fillStyle = "#5a7d65";
    ctx.font = "italic 28px 'PingFang SC','Microsoft YaHei',sans-serif";
    ctx.fillText("「" + currentPillar.quote + "」", w/2, y);
    y += 50;
  }

  // === 纳音 + 序号 ===
  ctx.fillStyle = "#8d9f92";
  ctx.font = "22px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText(currentPillar.title + "  ·  六十甲子第" + (currentPillarIndex+1) + "柱", w/2, y);
  y += 36;

  // === 五行标签 ===
  var elemTag = ELEMENTS[currentStemIndex] + " · " + YIN_YANG[currentStemIndex];
  ctx.font = "bold 22px 'PingFang SC','Microsoft YaHei',sans-serif";
  var etw = ctx.measureText(elemTag).width + 36;
  ctx.fillStyle = elemColors[currentStemIndex];
  roundRect(ctx, w/2 - etw/2, y-8, etw, 38, 19);
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.fillText(elemTag, w/2, y+16);
  y += 60;

  // === 分隔 ===
  ctx.strokeStyle = "rgba(64,145,108,0.15)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(60, y);
  ctx.lineTo(w-60, y);
  ctx.stroke();
  y += 36;

  // === 性格标签（大方块 2行）===
  var traits = currentPillar.traits;
  var blockW = (w - 140) / 3;
  ctx.font = "bold 24px 'PingFang SC','Microsoft YaHei',sans-serif";
  var rowY = y;
  for (var r = 0; r < 2; r++) {
    for (var c = 0; c < 3; c++) {
      var ti = r * 3 + c;
      if (ti >= traits.length) break;
      var bx = 60 + c * (blockW + 10);
      var by = rowY + r * 60;
      ctx.fillStyle = "rgba(64,145,108,0.06)";
      ctx.strokeStyle = "rgba(64,145,108,0.2)";
      ctx.lineWidth = 1;
      roundRect(ctx, bx, by, blockW, 48, 14);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#2d6a4f";
      ctx.fillText(traits[ti], bx + blockW/2, by + 32);
    }
  }
  y += 140;

  // === 分隔 ===
  ctx.strokeStyle = "rgba(64,145,108,0.15)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(60, y);
  ctx.lineTo(w-60, y);
  ctx.stroke();
  y += 32;

  // === 底部 ===
  ctx.fillStyle = "rgba(45,58,48,0.4)";
  ctx.font = "18px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText("基于 滴天髓 · 子平真诠 · 穷通宝鉴 · 三命通会 · 渊海子平", w/2, y);
  y += 32;
  ctx.fillText("bazi-personality.pages.dev", w/2, y);
  y += 30;
  ctx.fillStyle = "rgba(45,58,48,0.25)";
  ctx.font = "16px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText("命理之说 · 仅供娱乐", w/2, y);

  posterModal.classList.add("show");
}

// 辅助函数：圆角矩形
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// 辅助函数：自动换行
function wrapText(ctx, text, cx, y, maxW, lineH) {
  ctx.textAlign = "center";
  var chars = text.split("");
  var line = "";
  var curY = y;
  for (var i = 0; i < chars.length; i++) {
    var testLine = line + chars[i];
    if (ctx.measureText(testLine).width > maxW && line.length > 0) {
      ctx.fillText(line, cx, curY);
      line = chars[i];
      curY += lineH;
    } else { line = testLine; }
  }
  if (line.length > 0) ctx.fillText(line, cx, curY);
}
