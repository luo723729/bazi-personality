<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>六十甲子日柱性格 - 八字探秘</title>
<style>
  :root {
    --bg: #1a0a0a;
    --card-bg: #2d1513;
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --red: #b5343a;
    --red-light: #d4535a;
    --text: #e8d5c8;
    --text-dim: #b8a08a;
    --wood: #6b8e4e;
    --fire: #d4533a;
    --earth: #c9a040;
    --metal: #a09068;
    --water: #4a80b4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ===== 页面容器 ===== */
  .page {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.4s ease, opacity 0.4s ease;
  }
  .page-input { display: flex; }
  .page-result { display: none; }
  body.show-result .page-input { display: none; }
  body.show-result .page-result { display: flex; animation: fadeUp 0.45s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== 顶部装饰 ===== */
  .header {
    text-align: center;
    padding: 28px 20px 6px;
    position: relative;
  }
  .header .icon { font-size: 52px; margin-bottom: 6px; filter: drop-shadow(0 0 12px rgba(201,169,110,0.5)); }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
  .header .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; letter-spacing: 2px; }

  .divider {
    width: 60%; max-width: 260px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 14px auto; opacity: 0.6;
  }

  /* ===== 输入卡片 ===== */
  .card {
    background: var(--card-bg);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 14px;
    padding: 22px 20px;
    width: calc(100% - 32px);
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    margin: 10px 0;
  }
  .card label { display: block; font-size: 14px; color: var(--gold-light); margin-bottom: 8px; letter-spacing: 1px; }
  .card input[type="date"] {
    width: 100%; padding: 12px 14px; font-size: 16px;
    border: 1px solid rgba(201,169,110,0.35); border-radius: 10px;
    background: rgba(0,0,0,0.3); color: var(--text); font-family: inherit; outline: none;
    transition: border-color 0.3s; -webkit-appearance: none;
  }
  .card input[type="date"]:focus { border-color: var(--gold); }
  .card input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.7) sepia(1) saturate(3) hue-rotate(10deg);
  }

  .btn {
    display: block; width: calc(100% - 32px); max-width: 400px; margin: 16px auto;
    padding: 14px 0; font-size: 17px; font-weight: 700; letter-spacing: 2px;
    color: #fff; background: linear-gradient(135deg, #8b2a2e, #b5343a);
    border: none; border-radius: 25px; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(181,52,58,0.35); transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(181,52,58,0.3); }

  /* ===== 日柱展示 ===== */
  .pillar-section { text-align: center; margin: 6px 0 12px; }
  .pillar-name {
    font-size: 48px; font-weight: 900; color: var(--gold-light);
    letter-spacing: 6px; text-shadow: 0 0 40px rgba(201,169,110,0.4);
    line-height: 1.1;
  }
  .pillar-subtitle { font-size: 14px; color: var(--text-dim); margin-top: 2px; letter-spacing: 2px; }

  /* 序号徽章 */
  .rank-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 20px; margin: 10px 0 6px;
    background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.3);
    font-size: 12px; color: var(--gold-light); letter-spacing: 1px;
  }
  .rank-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
    box-shadow: 0 0 6px var(--gold);
  }

  /* 五行标签 */
  .element-tag {
    display: inline-block; padding: 6px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600; letter-spacing: 2px; color: #fff; margin: 0 auto 14px;
  }
  .element-tag.wood  { background: var(--wood); }
  .element-tag.fire  { background: var(--fire); }
  .element-tag.earth { background: var(--earth); color: #3a2a00; }
  .element-tag.metal { background: var(--metal); }
  .element-tag.water { background: var(--water); }

  /* 性格分析 */
  .personality-card {
    background: var(--card-bg);
    border: 1px solid rgba(201,169,110,0.15);
    border-radius: 14px; padding: 20px 18px; margin-bottom: 14px; position: relative;
    width: calc(100% - 32px); max-width: 400px;
  }
  .personality-card::before {
    content: "❝"; position: absolute; top: -8px; left: 14px;
    font-size: 24px; color: var(--gold); opacity: 0.4;
  }
  .personality-card h3 { font-size: 15px; color: var(--gold); margin-bottom: 10px; letter-spacing: 1px; }
  .personality-card p { font-size: 14px; line-height: 1.9; color: var(--text); text-align: justify; }

  .traits-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .trait-chip {
    padding: 5px 12px; border-radius: 14px; font-size: 12px;
    background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.25); color: var(--gold-light);
  }

  .btn-reset {
    display: block; width: calc(100% - 32px); max-width: 400px; margin: 6px auto 30px;
    padding: 12px 0; font-size: 14px; letter-spacing: 1px; color: var(--gold);
    background: transparent; border: 1px solid rgba(201,169,110,0.4); border-radius: 25px;
    cursor: pointer; font-family: inherit; transition: background 0.2s;
  }
  .btn-reset:active { background: rgba(201,169,110,0.1); }

  .footer {
    text-align: center; font-size: 11px; color: rgba(200,180,160,0.35);
    padding: 20px 0 24px; letter-spacing: 1px; margin-top: auto;
  }
</style>
</head>

// ==================== 核心算法 ====================

/** 计算六十甲子序号（0~59） */
function getPillarIndex(stemIndex, branchIndex) {
  return ((stemIndex * 6) - (branchIndex * 5) + 60) % 60;
}

/**
 * 计算日柱（标准公式）
 * 基准：1900-01-01 = 甲戌日（六十甲子第11位，0-indexed 第10位）
 * 公式：基数 = (年尾+3)*5 + 55 + (年尾-1)/4 + 当年第几天
 * 日干序号 = 基数%10（1甲2乙...0癸）
 * 日支序号 = 基数%12（1子2丑...0亥）
 * 等效于：diffDays + 10 偏移后取模
 */
function calcDayPillar(year, month, day) {
  var baseDate = new Date(1900, 0, 1);
  var targetDate = new Date(year, month - 1, day);
  var diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
  // 基准日 1900-01-01 = 甲戌（天干偏移+10，地支偏移+10）
  var stemIndex  = ((diffDays + 10) % 10 + 10) % 10;
  var branchIndex = ((diffDays + 10) % 12 + 12) % 12;
  var pillarIndex = getPillarIndex(stemIndex, branchIndex);
  return {
    stem: STEMS[stemIndex],
    branch: BRANCHES[branchIndex],
    stemIndex: stemIndex,
    branchIndex: branchIndex,
    pillarIndex: pillarIndex,
    pillarData: PILLARS[pillarIndex]
  };
}

// ==================== 页面逻辑 ====================

var birthInput = document.getElementById("birthDate");
var btnCalc = document.getElementById("btnCalc");
var btnReset = document.getElementById("btnReset");

// 默认设为今天
var today = new Date();
birthInput.value = (function(d) {
  var y = d.getFullYear();
  var m = ("0" + (d.getMonth() + 1)).slice(-2);
  var day = ("0" + d.getDate()).slice(-2);
  return y + "-" + m + "-" + day;
})(today);

function showResult() {
  var dateStr = birthInput.value;
  if (!dateStr) { alert("请先选择出生日期～"); return; }

  var parts = dateStr.split("-");
  var year  = parseInt(parts[0], 10);
  var month = parseInt(parts[1], 10);
  var day   = parseInt(parts[2], 10);

  var pillar = calcDayPillar(year, month, day);
  var pd = pillar.pillarData;
  var si = pillar.stemIndex;

  // 日柱名称 & 标签
  document.getElementById("pillarName").textContent = pd.name;
  document.getElementById("pillarLabel").textContent = "日柱";

  // 序号徽章
  document.getElementById("rankText").textContent =
    "六十甲子 第 " + (pillar.pillarIndex + 1) + "/60 柱";

  // 五行
  var elemTag = document.getElementById("elementTag");
  elemTag.textContent = ELEMENTS[si] + "（" + YIN_YANG[si] + "）";
  elemTag.className = "element-tag " + ELEM_CSS[si];

  // 性格
  document.getElementById("personalityTitle").textContent = pd.title;
  document.getElementById("personalityText").textContent = pd.desc;

  var traitsHtml = "";
  for (var i = 0; i < pd.traits.length; i++) {
    traitsHtml += '<span class="trait-chip">' + pd.traits[i] + "</span>";
  }
  document.getElementById("traitsRow").innerHTML = traitsHtml;

  // 切换页面
  document.body.classList.add("show-result");

  // 滚动到顶部
  setTimeout(function () {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, 100);
}

function resetResult() {
  document.body.classList.remove("show-result");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

btnCalc.addEventListener("click", showResult);
btnReset.addEventListener("click", resetResult);

// 页面加载时默认填充今天日期，但不自动展示结果
// 用户点击按钮后才弹出结果页
</script>
