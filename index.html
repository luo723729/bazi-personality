<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>六十甲子日柱性格 - 八字探秘</title>
<style>
  :root {
    --bg: #1a0a0a;
    --card-bg: #2d1513;
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --red: #b5343a;
    --red-light: #d4535a;
    --text: #e8d5c8;
    --text-dim: #b8a08a;
    --wood: #6b8e4e;
    --fire: #d4533a;
    --earth: #c9a040;
    --metal: #a09068;
    --water: #4a80b4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ===== 页面容器 ===== */
  .page {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.4s ease, opacity 0.4s ease;
  }
  .page-input { display: flex; }
  .page-result { display: none; }
  body.show-result .page-input { display: none; }
  body.show-result .page-result { display: flex; animation: fadeUp 0.45s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== 顶部装饰 ===== */
  .header {
    text-align: center;
    padding: 28px 20px 6px;
    position: relative;
  }
  .header .icon { font-size: 52px; margin-bottom: 6px; filter: drop-shadow(0 0 12px rgba(201,169,110,0.5)); }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
  .header .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; letter-spacing: 2px; }

  .divider {
    width: 60%; max-width: 260px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 14px auto; opacity: 0.6;
  }

  /* ===== 输入卡片 ===== */
  .card {
    background: var(--card-bg);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 14px;
    padding: 22px 20px;
    width: calc(100% - 32px);
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    margin: 10px 0;
  }
  .card label { display: block; font-size: 14px; color: var(--gold-light); margin-bottom: 8px; letter-spacing: 1px; }
  .card input[type="date"] {
    width: 100%; padding: 12px 14px; font-size: 16px;
    border: 1px solid rgba(201,169,110,0.35); border-radius: 10px;
    background: rgba(0,0,0,0.3); color: var(--text); font-family: inherit; outline: none;
    transition: border-color 0.3s; -webkit-appearance: none;
  }
  .card input[type="date"]:focus { border-color: var(--gold); }
  .card input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.7) sepia(1) saturate(3) hue-rotate(10deg);
  }

  .btn {
    display: block; width: calc(100% - 32px); max-width: 400px; margin: 16px auto;
    padding: 14px 0; font-size: 17px; font-weight: 700; letter-spacing: 2px;
    color: #fff; background: linear-gradient(135deg, #8b2a2e, #b5343a);
    border: none; border-radius: 25px; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(181,52,58,0.35); transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(181,52,58,0.3); }

  /* ===== 日柱展示 ===== */
  .pillar-section { text-align: center; margin: 6px 0 12px; }
  .pillar-name {
    font-size: 48px; font-weight: 900; color: var(--gold-light);
    letter-spacing: 6px; text-shadow: 0 0 40px rgba(201,169,110,0.4);
    line-height: 1.1;
  }
  .pillar-subtitle { font-size: 14px; color: var(--text-dim); margin-top: 2px; letter-spacing: 2px; }

  /* 序号徽章 */
  .rank-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 20px; margin: 10px 0 6px;
    background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.3);
    font-size: 12px; color: var(--gold-light); letter-spacing: 1px;
  }
  .rank-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
    box-shadow: 0 0 6px var(--gold);
  }

  /* 五行标签 */
  .element-tag {
    display: inline-block; padding: 6px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600; letter-spacing: 2px; color: #fff; margin: 0 auto 14px;
  }
  .element-tag.wood  { background: var(--wood); }
  .element-tag.fire  { background: var(--fire); }
  .element-tag.earth { background: var(--earth); color: #3a2a00; }
  .element-tag.metal { background: var(--metal); }
  .element-tag.water { background: var(--water); }

  /* 性格分析 */
  .personality-card {
    background: var(--card-bg);
    border: 1px solid rgba(201,169,110,0.15);
    border-radius: 14px; padding: 20px 18px; margin-bottom: 14px; position: relative;
    width: calc(100% - 32px); max-width: 400px;
  }
  .personality-card::before {
    content: "❝"; position: absolute; top: -8px; left: 14px;
    font-size: 24px; color: var(--gold); opacity: 0.4;
  }
  .personality-card h3 { font-size: 15px; color: var(--gold); margin-bottom: 10px; letter-spacing: 1px; }
  .personality-card p { font-size: 14px; line-height: 1.9; color: var(--text); text-align: justify; }

  .traits-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .trait-chip {
    padding: 5px 12px; border-radius: 14px; font-size: 12px;
    background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.25); color: var(--gold-light);
  }

  .btn-reset {
    display: block; width: calc(100% - 32px); max-width: 400px; margin: 6px auto 30px;
    padding: 12px 0; font-size: 14px; letter-spacing: 1px; color: var(--gold);
    background: transparent; border: 1px solid rgba(201,169,110,0.4); border-radius: 25px;
    cursor: pointer; font-family: inherit; transition: background 0.2s;
  }
  .btn-reset:active { background: rgba(201,169,110,0.1); }

  /* 稀有度 */
  .rarity-badge {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: calc(100% - 32px); max-width: 400px; margin: 0 auto 12px;
    padding: 10px 0; font-size: 13px; color: var(--gold-light); letter-spacing: 1px;
    background: rgba(201,169,110,0.06); border-radius: 10px;
    border: 1px dashed rgba(201,169,110,0.25);
  }
  .rarity-icon { font-size: 16px; }

  /* 分享按钮 */
  .btn-share {
    display: block; width: calc(100% - 32px); max-width: 400px; margin: 14px auto 10px;
    padding: 13px 0; font-size: 15px; font-weight: 600; letter-spacing: 2px;
    color: #fff; background: linear-gradient(135deg, #1a6b3c, #2d9d5a);
    border: none; border-radius: 25px; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(45,157,90,0.3); transition: transform 0.2s;
  }
  .btn-share:active { transform: scale(0.97); }

  /* 海报弹窗 */
  .poster-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
  .poster-modal.show { display: flex; align-items: center; justify-content: center; }
  .poster-backdrop { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
  .poster-container { position: relative; z-index: 1; text-align: center; max-width: 90vw; max-height: 90vh; }
  .poster-container canvas { width: 100%; max-width: 375px; height: auto; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
  .poster-tip { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 12px; letter-spacing: 1px; }
  .poster-close {
    position: absolute; top: -40px; right: 0; width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.15); color: #fff; border: none; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .footer {
    text-align: center; font-size: 11px; color: rgba(200,180,160,0.35);
    padding: 20px 0 24px; letter-spacing: 1px; margin-top: auto;
  }
</style>
</head>

<!-- ========== 输入页 ========== -->
<div class="page page-input">
  <div class="header">

<script>

  {
    name:"甲子", title:"甲子 · 海中金",

    traits:["正印护身","外柔内刚","善谋略","寒木向阳","纳音金水相生"]
  },
  {
    name:"乙丑", title:"乙丑 · 海中金",
    desc:"乙木坐丑土，丑中己土偏财、癸水偏印、辛金七杀。乙木衰于丑，财杀印三杂。纳音海中金，金克木为杀，得癸水化杀生身。子平真诠云「乙木虽柔，刲羊解牛」，以柔克刚之象。性格外柔内韧，善以智取胜，表面随和内心刚毅，理财有方然需防贪多。【事业】善理财适合商贸、金融，以柔克刚能在谈判中占优，忌急功近利。【婚姻】表面柔顺实则有主见，需防过度追求物质影响感情，宜找包容型伴侣。【优点】善理财、应变灵活、外柔内刚。【缺点】易贪心、内心矛盾、患得患失。",
    traits:["柔中带刚","以智取胜","偏财有根","财杀印杂","外和内刚"]

  {
    name:"丙寅", title:"丙寅 · 炉中火",

    traits:["长生得地","光明磊落","精力充沛","正直刚烈","长生之火"]
  },
  {

    traits:["温文尔雅","心思细腻","抱木而明","内在敏感","柔能克刚"]

  {

// ==================== 核心算法 ====================

/** 计算六十甲子序号（0~59） */
function getPillarIndex(stemIndex, branchIndex) {
  return ((stemIndex * 6) - (branchIndex * 5) + 60) % 60;
}

/**
 * 计算日柱（标准公式）
 * 基准：1900-01-01 = 甲戌日（六十甲子第11位，0-indexed 第10位）
 * 公式：基数 = (年尾+3)*5 + 55 + (年尾-1)/4 + 当年第几天
 * 日干序号 = 基数%10（1甲2乙...0癸）
 * 日支序号 = 基数%12（1子2丑...0亥）
 * 等效于：diffDays + 10 偏移后取模
 */
function calcDayPillar(year, month, day) {
  var baseDate = new Date(1900, 0, 1);
  var targetDate = new Date(year, month - 1, day);
  var diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
  // 基准日 1900-01-01 = 甲戌（天干偏移+10，地支偏移+10）
  var stemIndex  = ((diffDays + 10) % 10 + 10) % 10;
  var branchIndex = ((diffDays + 10) % 12 + 12) % 12;
  var pillarIndex = getPillarIndex(stemIndex, branchIndex);
  return {
    stem: STEMS[stemIndex],
    branch: BRANCHES[branchIndex],
    stemIndex: stemIndex,
    branchIndex: branchIndex,
    pillarIndex: pillarIndex,
    pillarData: PILLARS[pillarIndex]
  };
}

var currentPillar = null;

// 默认设为今天
var today = new Date();
birthInput.value = (function(d) {
  var y = d.getFullYear();
  var m = ("0" + (d.getMonth() + 1)).slice(-2);
  var day = ("0" + d.getDate()).slice(-2);
  return y + "-" + m + "-" + day;
})(today);

function showResult() {
  var dateStr = birthInput.value;
  if (!dateStr) { alert("请先选择出生日期～"); return; }

  var parts = dateStr.split("-");
  var year  = parseInt(parts[0], 10);
  var month = parseInt(parts[1], 10);
  var day   = parseInt(parts[2], 10);

  var pillar = calcDayPillar(year, month, day);
  var pd = pillar.pillarData;
  var si = pillar.stemIndex;

  // 日柱名称 & 标签
  document.getElementById("pillarName").textContent = pd.name;
  document.getElementById("pillarLabel").textContent = "日柱";

  // 序号徽章
  document.getElementById("rankText").textContent =
    "六十甲子 第 " + (pillar.pillarIndex + 1) + "/60 柱";

  // 五行
  var elemTag = document.getElementById("elementTag");
  elemTag.textContent = ELEMENTS[si] + "（" + YIN_YANG[si] + "）";
  elemTag.className = "element-tag " + ELEM_CSS[si];

  // 性格
  document.getElementById("personalityTitle").textContent = pd.title;
  document.getElementById("personalityText").textContent = pd.desc;

  var traitsHtml = "";
  for (var i = 0; i < pd.traits.length; i++) {
    traitsHtml += '<span class="trait-chip">' + pd.traits[i] + "</span>";
  }
  document.getElementById("traitsRow").innerHTML = traitsHtml;

  // 稀有度
  document.getElementById("rarityText").textContent =
    "每60天轮回一次 · 六十亿人中独一无二的" + pd.name + "日柱";

  // 保存当前数据供海报使用
  currentPillar = pd;
  currentPillarIndex = pillar.pillarIndex;
  currentStemIndex = si;

  // 切换页面

  // 滚动到顶部
  setTimeout(function () {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, 100);
}

function resetResult() {
  document.body.classList.remove("show-result");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

btnCalc.addEventListener("click", showResult);

// ==================== 分享海报 ====================

function generatePoster() {
  if (!currentPillar) return;
  var canvas = posterCanvas;
  var ctx = canvas.getContext("2d");
  var w = canvas.width;
  var h = canvas.height;

  // 背景渐变
  var bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, "#1a0a0a");
  bg.addColorStop(0.5, "#2d1513");
  bg.addColorStop(1, "#1a0a0a");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // 顶部装饰纹理（金色散点）
  ctx.fillStyle = "rgba(201,169,110,0.06)";
  for (var i = 0; i < 80; i++) {
    var dx = Math.random() * w;
    var dy = Math.random() * h * 0.5;
    ctx.beginPath();
    ctx.arc(dx, dy, Math.random() * 3 + 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // 顶部 ☯️ 图标
  ctx.font = "64px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("☯️", w / 2, 100);

  // 标题
  ctx.fillStyle = "#c9a96e";
  ctx.font = "bold 36px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText("六十甲子日柱", w / 2, 168);

  // 分隔线
  ctx.strokeStyle = "rgba(201,169,110,0.4)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(w / 2 - 100, 188);
  ctx.lineTo(w / 2 + 100, 188);
  ctx.stroke();

  // 日柱大字
  var elemColors = ["#6b8e4e","#6b8e4e","#d4533a","#d4533a","#c9a040","#c9a040","#a09068","#a09068","#4a80b4","#4a80b4"];
  var nameColor = elemColors[currentStemIndex] || "#e8d5a3";
  ctx.fillStyle = nameColor;
  ctx.font = "bold 160px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText(currentPillar.name, w / 2, 370);

  // 纳音标题
  ctx.fillStyle = "#e8d5a3";
  ctx.font = "28px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText(currentPillar.title, w / 2, 420);

  // 序号 + 稀有度
  ctx.fillStyle = "rgba(201,169,110,0.7)";
  ctx.font = "22px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText("六十甲子 第" + (currentPillarIndex + 1) + "柱 · 每60天一次轮回", w / 2, 465);

  // 五行标签
  var elemTag = ELEMENTS[currentStemIndex] + " · " + YIN_YANG[currentStemIndex];
  ctx.fillStyle = "#fff";
  var elemBg = elemColors[currentStemIndex] || "#c9a96e";
  var tagW = ctx.measureText("  " + elemTag + "  ").width;
  var tagX = w / 2 - tagW / 2;
  var tagY = 495;
  ctx.fillStyle = elemBg;
  roundRect(ctx, tagX, tagY - 28, tagW, 34, 17);
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.font = "bold 20px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText("  " + elemTag + "  ", w / 2, tagY - 2);

  // 性格描述（截取前120字）
  var descText = currentPillar.desc;
  if (descText.length > 140) descText = descText.substring(0, 140) + "…";
  ctx.fillStyle = "#e8d5c8";
  ctx.font = "22px 'PingFang SC','Microsoft YaHei',sans-serif";
  wrapText(ctx, descText, w / 2, 570, w - 100, 34);

  // 特质标签
  var traits = currentPillar.traits;
  var traitY = 730;
  ctx.font = "20px 'PingFang SC','Microsoft YaHei',sans-serif";
  for (var t = 0; t < traits.length; t++) {
    var tw = ctx.measureText(traits[t]).width + 32;
    var tx = 60 + (t % 3) * 220;
    var trow = Math.floor(t / 3);
    ctx.fillStyle = "rgba(201,169,110,0.15)";
    ctx.strokeStyle = "rgba(201,169,110,0.3)";
    ctx.lineWidth = 1;
    roundRect(ctx, tx, traitY + trow * 44 - 24, tw, 34, 17);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#e8d5a3";
    ctx.fillText(traits[t], tx + tw / 2, traitY + trow * 44 - 2);
  }

  // 分隔线
  ctx.strokeStyle = "rgba(201,169,110,0.3)";
  ctx.beginPath();
  ctx.moveTo(w / 2 - 100, 920);
  ctx.lineTo(w / 2 + 100, 920);
  ctx.stroke();

  // 底部信息
  ctx.fillStyle = "rgba(200,180,160,0.5)";
  ctx.font = "18px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText("基于 滴天髓 · 子平真诠 · 穷通宝鉴 · 三命通会 · 渊海子平", w / 2, 970);
  ctx.fillText("扫码测测你的日柱 → bazi-personality.pages.dev", w / 2, 1000);

  // 底部装饰线
  ctx.strokeStyle = "rgba(201,169,110,0.2)";
  ctx.beginPath();
  ctx.moveTo(60, 1030);
  ctx.lineTo(w - 60, 1030);
  ctx.stroke();
  ctx.fillText("命理之说 · 仅供娱乐", w / 2, 1060);

  // 显示弹窗
  posterModal.classList.add("show");
}

// 辅助函数：圆角矩形
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// 辅助函数：自动换行
function wrapText(ctx, text, cx, y, maxW, lineH) {
  ctx.textAlign = "center";
  var chars = text.split("");
  var line = "";
  var curY = y;
  for (var i = 0; i < chars.length; i++) {
    var testLine = line + chars[i];
    if (ctx.measureText(testLine).width > maxW && line.length > 0) {
      ctx.fillText(line, cx, curY);
      line = chars[i];
      curY += lineH;
    } else { line = testLine; }
  }
  if (line.length > 0) ctx.fillText(line, cx, curY);
}

// 海报弹窗事件
btnShare.addEventListener("click", generatePoster);

function closePoster() {
  posterModal.classList.remove("show");
}
posterClose.addEventListener("click", closePoster);
posterBackdrop.addEventListener("click", closePoster);
